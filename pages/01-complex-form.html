<html>
<head>
<style>
/* ===========================
   Complex Form Test Page
   Tests: inputs, buttons, selectors, flex layout, borders, colors
   =========================== */
body {
  background-color: #1a1a2e;
  color: #e0e0e0;
  padding: 1;
}

h1 {
  color: #e94560;
  text-align: center;
  font-weight: bold;
  margin: 1;
}

.form-card {
  background-color: #0f3460;
  padding: 2;
  margin: 1;
  border: 1;
  border-style: solid;
  border-color: #e94560;
}

.form-card h2 {
  color: #53a8b6;
  font-weight: bold;
  margin: 1;
}

.form-row {
  display: flex;
  align-items: center;
  gap: 2;
  margin-bottom: 1;
}

.form-row label {
  color: #53a8b6;
  min-width: 12;
  font-weight: bold;
}

.form-row input {
  background-color: #1a1a2e;
  color: #e0e0e0;
  width: 24;
}

.form-row input:focus {
  background-color: #16213e;
  color: #fff;
}

.form-row select {
  background-color: #1a1a2e;
  color: #e0e0e0;
  width: 24;
}

.btn-group {
  display: flex;
  justify-content: center;
  gap: 3;
  margin: 1;
}

.btn-primary {
  background-color: #e94560;
  color: #fff;
  font-weight: bold;
}

.btn-primary:hover {
  background-color: #ff6b81;
}

.btn-primary:active {
  background-color: #c23150;
}

.btn-secondary {
  background-color: #16213e;
  color: #53a8b6;
  font-weight: bold;
}

.btn-secondary:hover {
  background-color: #0f3460;
}

.btn-secondary:active {
  background-color: #0a1628;
}

.btn-danger {
  background-color: #c0392b;
  color: #fff;
  font-weight: bold;
}

.btn-danger:hover {
  background-color: #e74c3c;
}

hr {
  color: #53a8b6;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  background-color: #16213e;
  padding: 1;
  margin-bottom: 1;
}

.status-item {
  color: #e0e0e0;
}

.status-item:first-child {
  font-weight: bold;
}

.note {
  color: #f1c40f;
  font-weight: bold;
}

.fieldset {
  border: 1;
  border-style: dotted;
  border-color: #53a8b6;
  padding: 2;
  margin: 1;
}

.fieldset legend {
  color: #e94560;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>📝 Complex Form Test</h1>

<div class="status-bar">
  <span class="status-item">Status: Ready</span>
  <span class="status-item">User: Test</span>
  <span class="status-item">Mode: Demo</span>
</div>

<div class="form-card">
  <h2>👤 Personal Information</h2>
  <hr>
  <div class="form-row">
    <label>First Name:</label>
    <input id="inp-firstname" value="John">
  </div>
  <div class="form-row">
    <label>Last Name:</label>
    <input id="inp-lastname" value="Doe">
  </div>
  <div class="form-row">
    <label>Email:</label>
    <input id="inp-email" value="john@example.com">
  </div>
  <div class="form-row">
    <label>Phone:</label>
    <input id="inp-phone" value="+86 138-0000-0000">
  </div>
</div>

<div class="form-card">
  <h2>🔐 Account Settings</h2>
  <hr>
  <div class="form-row">
    <label>Username:</label>
    <input id="inp-username" value="johndoe">
  </div>
  <div class="form-row">
    <label>Password:</label>
    <input type='password' id="inp-password" value="admin123">
  </div>
  <div class="form-row">
    <label>Language:</label>
    <select id="sel-lang">
  </div>
</div>

<div class="form-card">
  <h2>🎯 Actions</h2>
  <hr>
  <div class="btn-group">
    <button id="btn-save" class="btn-primary">💾 Save</button>
    <button id="btn-clear" class="btn-secondary">🗑 Clear</button>
    <button id="btn-reset-f" class="btn-danger">↺ Reset</button>
  </div>
  <hr>
  <div class="btn-group">
    <button id="btn-test-1" class="btn-primary">Test 1</button>
    <button id="btn-test-2" class="btn-secondary">Test 2</button>
    <button id="btn-test-3" class="btn-danger">⚠ Danger</button>
  </div>
</div>

<div class="fieldset">
  <legend>📋 Validation Rules</legend>
  <p>Tab to navigate between fields</p>
  <p>Enter to click focused button</p>
  <p class="note">All fields are required for testing!</p>
</div>

<div class="btn-group">
  <button id="btn-back" class="btn-secondary">⬅ Back to Menu</button>
</div>

</body>
</html>
