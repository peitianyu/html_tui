<html>
<head>
<style>
/* ===========================
   Test 03: Input Fields
   Tests: text input, password, focus, cursor, placeholder, Save/Clear/Reset
   =========================== */
body { background-color: #1a1a1a; color: #c8c3b8; padding: 1; }
h1 { color: #d44545; text-align: center; font-weight: bold; margin: 1; }
h2 { color: #6d8a7a; font-weight: bold; margin: 1; }

.section { background-color: #242424; padding: 2; margin: 1; border: 1; border-style: solid; border-color: #3a3a3a; }

.form-row {
  display: flex;
  align-items: center;
  gap: 2;
  margin-bottom: 1;
}

.form-row label {
  color: #6d8a7a;
  min-width: 14;
  font-weight: bold;
}

.form-row input {
  background-color: #2e2e2e;
  color: #c8c3b8;
  width: 30;
}

.form-row input:focus {
  background-color: #3a3a3a;
  color: #e8e3d8;
}

/* input type=password uses • */
input[type="password"] {
  background-color: #2e2e2e;
  color: #c8c3b8;
  width: 30;
}

/* placeholder styling */
input::placeholder {
  color: #8a8580;
  font-style: italic;
}

.btn-group {
  display: flex;
  justify-content: center;
  gap: 3;
  margin: 1;
}

.btn-save {
  background-color: #6d8a7a;
  color: #1a1a1a;
  font-weight: bold;
}
.btn-save:hover { background-color: #8aaa98; }
.btn-save:active { background-color: #4a6a5a; }

.btn-clear {
  background-color: #d44545;
  color: #1a1a1a;
  font-weight: bold;
}
.btn-clear:hover { background-color: #e86565; }
.btn-clear:active { background-color: #b03030; }

.btn-reset {
  background-color: #c9a84c;
  color: #1a1a1a;
  font-weight: bold;
}
.btn-reset:hover { background-color: #e0c06a; }
.btn-reset:active { background-color: #a88830; }

/* label[for] test */
label[for] {
  cursor: pointer;
}

.label-for {
  color: #c9a84c;
}

.note { color: #8a8580; text-align: center; margin: 1; }

.footer { text-align: center; color: #8a8580; margin-top: 2; }
</style>
</head>
<body>

<h1>⌨ Test 03: Input Fields</h1>

<div class="section">
  <h2>Text Inputs</h2>
  <div class="form-row">
    <label>First Name:</label>
    <input id="inp-first" value="John">
  </div>
  <div class="form-row">
    <label>Last Name:</label>
    <input id="inp-last" value="Doe">
  </div>
  <div class="form-row">
    <label>Email:</label>
    <input id="inp-email" value="john@example.com">
  </div>
  <div class="form-row">
    <label>Phone:</label>
    <input id="inp-phone" value="+86 138-0000-0000">
  </div>
</div>

<div class="section">
  <h2>Password Input</h2>
  <div class="form-row">
    <label>Password:</label>
    <input type="password" id="inp-pass" value="secret123">
  </div>
</div>

<div class="section">
  <h2>Focus Test</h2>
  <p>Tab to focus inputs, ←/→ to move cursor, Home/End, Backspace/Delete</p>
  <div class="form-row">
    <label class="label-for">Focus me:</label>
    <input id="inp-focus" value="Type here to test cursor">
  </div>
  <div class="form-row">
    <label>Empty field:</label>
    <input id="inp-empty" value="">
  </div>
</div>

<div class="section">
  <h2>Actions</h2>
  <div class="btn-group">
    <button id="btn-save" class="btn-save">💾 Save All</button>
    <button id="btn-clear" class="btn-clear">🗑 Clear All</button>
    <button id="btn-reset-f" class="btn-reset">↺ Reset</button>
  </div>
</div>

<p class="note">
  Tab: next field | Enter/Save: collect values | Clear: empty all | Reset: defaults
</p>

<hr>

<div class="footer">
  <button id="btn-back">⬅ Back to Menu</button>
  Test 03 — Input Fields
</div>

</body>
</html>
