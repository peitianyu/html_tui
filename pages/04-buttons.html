<html>
<head>
<style>
/* ===========================
   Test 04: Buttons
   Tests: click, hover, active, multiple styles, status feedback
   =========================== */
body { background-color: #1a1a1a; color: #c8c3b8; padding: 1; }
h1 { color: #d44545; text-align: center; font-weight: bold; margin: 1; }
h2 { color: #6d8a7a; font-weight: bold; margin: 1; }

.section { background-color: #242424; padding: 2; margin: 1; border: 1; border-style: solid; border-color: #3a3a3a; }

.btn-row {
  display: flex;
  justify-content: center;
  gap: 3;
  margin: 1;
}

/* Primary */
.btn-primary {
  background-color: #d44545;
  color: #1a1a1a;
  font-weight: bold;
}
.btn-primary:hover { background-color: #e86565; }
.btn-primary:active { background-color: #b03030; }

/* Secondary */
.btn-secondary {
  background-color: #2e2e2e;
  color: #6d8a7a;
  font-weight: bold;
  border: 1;
  border-style: solid;
  border-color: #6d8a7a;
}
.btn-secondary:hover { background-color: #3a3a3a; }
.btn-secondary:active { background-color: #242424; }

/* Success */
.btn-success {
  background-color: #5a7a68;
  color: #1a1a1a;
  font-weight: bold;
}
.btn-success:hover { background-color: #6d8a7a; }
.btn-success:active { background-color: #4a6a58; }

/* Warning */
.btn-warning {
  background-color: #c9a84c;
  color: #1a1a1a;
  font-weight: bold;
}
.btn-warning:hover { background-color: #d8b85a; }
.btn-warning:active { background-color: #a88830; }

/* Danger */
.btn-danger {
  background-color: #8a3030;
  color: #c8c3b8;
  font-weight: bold;
}
.btn-danger:hover { background-color: #a84040; }
.btn-danger:active { background-color: #6a2020; }

/* Small / Large */
.btn-small {
  background-color: #6d8a7a;
  color: #1a1a1a;
  padding: 0 1;
}
.btn-large {
  background-color: #d44545;
  color: #1a1a1a;
  font-weight: bold;
  padding: 2 4;
}

/* Block button */
.btn-block {
  display: block;
  width: 40;
  background-color: #d44545;
  color: #1a1a1a;
  font-weight: bold;
  text-align: center;
  margin: 1 auto;
}
.btn-block:hover { background-color: #e86565; }

/* Status display */
.status-display {
  background-color: #2e2e2e;
  padding: 1;
  margin: 1;
  border: 1;
  border-style: dashed;
  border-color: #c9a84c;
  text-align: center;
  color: #c9a84c;
  font-weight: bold;
}

.note { color: #8a8580; text-align: center; margin: 1; }

.footer { text-align: center; color: #8a8580; margin-top: 2; }
</style>
</head>
<body>

<h1>🔘 Test 04: Buttons</h1>

<div class="section">
  <h2>Button Colors</h2>
  <div class="btn-row">
    <button id="btn-primary" class="btn-primary">Primary</button>
    <button id="btn-secondary" class="btn-secondary">Secondary</button>
    <button id="btn-success" class="btn-success">Success</button>
    <button id="btn-warning" class="btn-warning">Warning</button>
    <button id="btn-danger" class="btn-danger">Danger</button>
  </div>
</div>

<div class="section">
  <h2>Hover &amp; Active Effects</h2>
  <p>Hover over a button to see its hover color. Click to see active color.</p>
  <div class="btn-row">
    <button id="btn-hover-1" class="btn-primary">Hover Me</button>
    <button id="btn-hover-2" class="btn-success">Hover Me Too</button>
    <button id="btn-hover-3" class="btn-warning">And Me</button>
  </div>
</div>

<div class="section">
  <h2>Button Sizes</h2>
  <div class="btn-row">
    <button id="btn-small" class="btn-small">Tiny</button>
    <button id="btn-med" class="btn-primary">Medium</button>
    <button id="btn-large" class="btn-large">Large Button</button>
  </div>
</div>

<div class="section">
  <h2>Block Button</h2>
  <button id="btn-block" class="btn-block">Full Width Button</button>
</div>

<div class="section">
  <h2>Action Buttons with Status Feedback</h2>
  <div class="btn-row">
    <button id="btn-act-1" class="btn-success">⚡ Trigger Test 1</button>
    <button id="btn-act-2" class="btn-warning">⚡ Trigger Test 2</button>
    <button id="btn-act-3" class="btn-danger">⚠ Danger Action</button>
  </div>
</div>

<p class="note">Press Tab to focus, Enter to click. Status shown at bottom.</p>

<hr>

<div class="footer">
  <button id="btn-back">⬅ Back to Menu</button>
  Test 04 — Buttons
</div>

</body>
</html>
