<html>
<head>
<style>
/* ===========================
   Test 04: Buttons
   Tests: click, hover, active, multiple styles, status feedback
   =========================== */
body { background-color: #222; color: #ccc; padding: 1; }
h1 { color: #e94560; text-align: center; font-weight: bold; margin: 1; }
h2 { color: #53a8b6; font-weight: bold; margin: 1; }

.section { background-color: #333; padding: 2; margin: 1; border: 1; border-style: solid; border-color: #555; }

.btn-row {
  display: flex;
  justify-content: center;
  gap: 3;
  margin: 1;
}

/* Primary */
.btn-primary {
  background-color: #e94560;
  color: #fff;
  font-weight: bold;
}
.btn-primary:hover { background-color: #ff6b81; }
.btn-primary:active { background-color: #c23150; }

/* Secondary */
.btn-secondary {
  background-color: #16213e;
  color: #53a8b6;
  font-weight: bold;
  border: 1;
  border-style: solid;
  border-color: #53a8b6;
}
.btn-secondary:hover { background-color: #0f3460; }
.btn-secondary:active { background-color: #0a1628; }

/* Success */
.btn-success {
  background-color: #27ae60;
  color: #fff;
  font-weight: bold;
}
.btn-success:hover { background-color: #2ecc71; }
.btn-success:active { background-color: #1e8449; }

/* Warning */
.btn-warning {
  background-color: #f39c12;
  color: #222;
  font-weight: bold;
}
.btn-warning:hover { background-color: #f1c40f; }
.btn-warning:active { background-color: #d68910; }

/* Danger */
.btn-danger {
  background-color: #c0392b;
  color: #fff;
  font-weight: bold;
}
.btn-danger:hover { background-color: #e74c3c; }
.btn-danger:active { background-color: #922b21; }

/* Small / Large */
.btn-small {
  background-color: #53a8b6;
  color: #fff;
  padding: 0 1;
}
.btn-large {
  background-color: #e94560;
  color: #fff;
  font-weight: bold;
  padding: 2 4;
}

/* Block button */
.btn-block {
  display: block;
  width: 40;
  background-color: #e94560;
  color: #fff;
  font-weight: bold;
  text-align: center;
  margin: 1 auto;
}
.btn-block:hover { background-color: #ff6b81; }

/* Status display */
.status-display {
  background-color: #1a1a2e;
  padding: 1;
  margin: 1;
  border: 1;
  border-style: dashed;
  border-color: #f9e069;
  text-align: center;
  color: #f9e069;
  font-weight: bold;
}

.note { color: #888; text-align: center; margin: 1; }

.footer { text-align: center; color: #888; margin-top: 2; }
</style>
</head>
<body>

<h1>🔘 Test 04: Buttons</h1>

<div class="section">
  <h2>Button Colors</h2>
  <div class="btn-row">
    <button id="btn-primary" class="btn-primary">Primary</button>
    <button id="btn-secondary" class="btn-secondary">Secondary</button>
    <button id="btn-success" class="btn-success">Success</button>
    <button id="btn-warning" class="btn-warning">Warning</button>
    <button id="btn-danger" class="btn-danger">Danger</button>
  </div>
</div>

<div class="section">
  <h2>Hover &amp; Active Effects</h2>
  <p>Hover over a button to see its hover color. Click to see active color.</p>
  <div class="btn-row">
    <button id="btn-hover-1" class="btn-primary">Hover Me</button>
    <button id="btn-hover-2" class="btn-success">Hover Me Too</button>
    <button id="btn-hover-3" class="btn-warning">And Me</button>
  </div>
</div>

<div class="section">
  <h2>Button Sizes</h2>
  <div class="btn-row">
    <button id="btn-small" class="btn-small">Tiny</button>
    <button id="btn-med" class="btn-primary">Medium</button>
    <button id="btn-large" class="btn-large">Large Button</button>
  </div>
</div>

<div class="section">
  <h2>Block Button</h2>
  <button id="btn-block" class="btn-block">Full Width Button</button>
</div>

<div class="section">
  <h2>Action Buttons with Status Feedback</h2>
  <div class="btn-row">
    <button id="btn-act-1" class="btn-success">⚡ Trigger Test 1</button>
    <button id="btn-act-2" class="btn-warning">⚡ Trigger Test 2</button>
    <button id="btn-act-3" class="btn-danger">⚠ Danger Action</button>
  </div>
</div>

<p class="note">Press Tab to focus, Enter to click. Status shown at bottom.</p>

<hr>

<div class="footer">
  <button id="btn-back">⬅ Back to Menu</button>
  Test 04 — Buttons
</div>

</body>
</html>
