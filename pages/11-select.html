<html>
<head>
<style>
/* ===========================
   Test 11: Select Dropdown
   Tests: select, option, optgroup
   =========================== */
body { background-color: #1a1a1a; color: #c8c3b8; padding: 1; }
h1 { color: #d44545; text-align: center; font-weight: bold; margin: 1; }
h2 { color: #6d8a7a; font-weight: bold; margin: 1; }

.section { background-color: #242424; padding: 2; margin: 1; border: 1; border-style: solid; border-color: #3a3a3a; }

select {
  background-color: #2e2e2e;
  color: #d44545;
  width: 24;
  border: 1;
  border-style: solid;
  border-color: #6d8a7a;
}

select:focus {
  background-color: #3a3a3a;
  color: #c9a84c;
}

/* Menu bar style selects */
.menubar {
  display: flex;
  background-color: #2e2e2e;
  border: 1;
  border-style: solid;
  border-color: #6d8a7a;
  padding: 0;
}

.menubar select {
  width: 10;
  background-color: #2e2e2e;
  color: #c8c3b8;
  border: none;
  margin: 0;
  padding: 0 1;
  text-align: center;
  border-style: none;
}

.menubar select:focus {
  background-color: #3a3a3a;
  color: #c9a84c;
  border-style: none;
}

/* Select with optgroup */
select.optgroup-select {
  background-color: #2e2e2e;
  color: #c8c3b8;
  width: 30;
  border: 1;
  border-style: solid;
  border-color: #c9a84c;
}

.form-row {
  display: flex;
  align-items: center;
  gap: 2;
  margin-bottom: 1;
}

.form-row label {
  color: #6d8a7a;
  min-width: 14;
  font-weight: bold;
}

.note { color: #8a8580; text-align: center; margin: 1; }

.footer { text-align: center; color: #8a8580; margin-top: 2; }
</style>
</head>
<body>

<h1>📋 Test 11: Select Dropdown</h1>

<div class="section">
  <h2>Basic Select</h2>
  <p>Tab to focus, Enter to cycle through options.</p>
  <div class="form-row">
    <label>Choose option:</label>
    <select id="sel-basic">
      <option value="Option A">Option A</option>
      <option value="Option B">Option B</option>
      <option value="Option C">Option C</option>
      <option value="Option D">Option D</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>Multiple Selects</h2>
  <div class="form-row">
    <label>Country:</label>
    <select id="sel-country">
      <option value="China">China</option>
      <option value="USA">USA</option>
      <option value="UK">UK</option>
      <option value="Japan">Japan</option>
      <option value="Germany">Germany</option>
    </select>
  </div>
  <div class="form-row">
    <label>Language:</label>
    <select id="sel-lang">
      <option value="Chinese">Chinese</option>
      <option value="English">English</option>
      <option value="Japanese">Japanese</option>
      <option value="German">German</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>Menu Bar (Selects as Menu Items)</h2>
  <div class="menubar">
    <select id="menu-file">
      <option value="  File">  File</option>
      <option value="  New">         New</option>
      <option value="  Open">        Open</option>
      <option value="  Save">        Save</option>
      <option value="  Exit">        Exit</option>
    </select>
    <select id="menu-edit">
      <option value="  Edit">  Edit</option>
      <option value="  Undo">        Undo</option>
      <option value="  Redo">        Redo</option>
      <option value="  Cut">         Cut</option>
      <option value="  Copy">        Copy</option>
      <option value="  Paste">       Paste</option>
    </select>
    <select id="menu-view">
      <option value="  View">  View</option>
      <option value="  Zoom">        Zoom</option>
      <option value="  Fullscreen">  Fullscreen</option>
      <option value="  Sidebar">     Sidebar</option>
    </select>
    <select id="menu-help">
      <option value="  Help">  Help</option>
      <option value="  About">       About</option>
      <option value="  Docs">        Docs</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>Select with Optgroup</h2>
  <p>Grouped options using &lt;optgroup&gt;:</p>
  <div class="form-row">
    <label>Drinks:</label>
    <select id="sel-drinks" class="optgroup-select">
      <optgroup label="☕ Hot">
        <option value="Coffee">Coffee</option>
        <option value="Tea">Tea</option>
        <option value="Hot Chocolate">Hot Chocolate</option>
      </optgroup>
      <optgroup label="🧊 Cold">
        <option value="Cola">Cola</option>
        <option value="Juice">Juice</option>
        <option value="Water">Water</option>
      </optgroup>
    </select>
  </div>
</div>

<p class="note">Tab: focus | Enter: cycle option | Select shows current value</p>

<hr>

<div class="footer">
  <button id="btn-back">⬅ Back to Menu</button>
  Test 11 — Select Dropdown
</div>

</body>
</html>
